name: Python package CI

on:
  pull_request:
    branches: [master]

# Run one package check for each update to a pull request targeting master.
# A newer commit cancels an obsolete run from the same pull request.
concurrency:
  group: python-package-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test-and-build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install . pytest
      - run: python -m pytest
      - name: Build wheel
        run: python -m pip wheel --no-deps . --wheel-dir dist
      - name: Install the built wheel in an isolated environment
        run: |
          python -m venv "$RUNNER_TEMP/koreanfa-wheel-check"
          "$RUNNER_TEMP/koreanfa-wheel-check/bin/pip" install --upgrade pip
          "$RUNNER_TEMP/koreanfa-wheel-check/bin/pip" install dist/*.whl
          (
            cd "$RUNNER_TEMP"
            "$RUNNER_TEMP/koreanfa-wheel-check/bin/python" - <<'PY'
          from koreanfa import __version__
          from koreanfa.resources import runtime_root

          root = runtime_root()
          for relative in ("forced_align.sh", "runtime/pipeline/text2lexicon.py", "model/kor_model/final.mdl", "model/jap_model/final.mdl"):
              assert (root / relative).exists(), root / relative
          print(__version__)
          PY
          )
      - name: Save wheel for inspection
        uses: actions/upload-artifact@v4
        with:
          name: koreanfa-wheel-py312
          path: dist/*.whl
          if-no-files-found: error
          retention-days: 14
