name: Build Linux engine candidate

# This workflow validates native-engine changes before a PR is merged. It can
# also be run manually after merge, but cannot create a tag, GitHub Release,
# or PyPI upload.
on:
  pull_request:
    branches: [master]
    paths:
      - ".github/workflows/engine-candidate.yml"
      - "engine/**"
      - "forced_align.sh"
      - "path.sh"
      - "runtime/**"
      - "model/**"
      - "koreanfa/**"
      - "example/**"
      - "pyproject.toml"
      - "setup.py"
  workflow_dispatch:

concurrency:
  group: linux-engine-candidate-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  ENGINE_VERSION: "2.0.0"

jobs:
  build-linux-x86_64:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes autoconf automake build-essential ca-certificates curl gettext gfortran libtool libtool-bin sox \
            libsndfile1-dev pkg-config zlib1g-dev
      - name: Build engine archive
        run: bash engine/build_linux_x86_64.sh "$RUNNER_TEMP/koreanfa-engine" "$ENGINE_VERSION"
      - name: Record archive checksum
        run: |
          cd "$RUNNER_TEMP/koreanfa-engine"
          sha256sum "koreanfa-engine-v$ENGINE_VERSION-linux-x86_64.tar.gz" \
            > "koreanfa-engine-v$ENGINE_VERSION-linux-x86_64.tar.gz.sha256"
      - name: Smoke-test engine archive
        run: python3 engine/verify_linux_x86_64.py "$RUNNER_TEMP/koreanfa-engine/koreanfa-engine-v$ENGINE_VERSION-linux-x86_64.tar.gz"
      - name: Verify Korean and Japanese alignment with the bundled engine
        env:
          ENGINE_CACHE: ${{ runner.temp }}/koreanfa-engine-cache
        run: |
          python -m pip install .
          stage="$RUNNER_TEMP/koreanfa-engine-stage"
          mkdir -p "$stage" "$ENGINE_CACHE/$ENGINE_VERSION"
          tar --extract --gzip --file "$RUNNER_TEMP/koreanfa-engine/koreanfa-engine-v$ENGINE_VERSION-linux-x86_64.tar.gz" --directory "$stage"
          mv "$stage/koreanfa-engine-v$ENGINE_VERSION-linux-x86_64" "$ENGINE_CACHE/$ENGINE_VERSION/linux-x86_64"
          KOREANFA_ENGINE_HOME="$ENGINE_CACHE" python - <<'PY'
          from pathlib import Path
          from tempfile import TemporaryDirectory

          from koreanfa import align

          root = Path.cwd()
          with TemporaryDirectory(prefix="koreanfa-engine-integration-") as output:
              destination = Path(output)
              kor = align(
                  root / "example" / "kor_files" / "fv01_t01_s01.wav",
                  root / "example" / "kor_files" / "fv01_t01_s01.txt",
                  output_dir=destination / "kor",
              )
              japanese_wav = next((root / "example" / "jap_files").glob("*.wav"))
              jap = align(japanese_wav, japanese_wav.with_suffix(".txt"), output_dir=destination / "jap")
              assert kor.textgrid.is_file()
              assert jap.textgrid.is_file()
          PY
      - name: Upload verified candidate
        uses: actions/upload-artifact@v4
        with:
          name: koreanfa-engine-v${{ env.ENGINE_VERSION }}-linux-x86_64
          path: |
            ${{ runner.temp }}/koreanfa-engine/*.tar.gz
            ${{ runner.temp }}/koreanfa-engine/*.sha256
          if-no-files-found: error
          retention-days: 14
